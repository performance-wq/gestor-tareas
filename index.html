<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizadísimos · Acceso</title>
<meta name="description" content="Organizadísimos — organiza y ejecuta los proyectos de tu equipo: tareas, subtareas y seguimiento en un solo lugar.">
<meta name="theme-color" content="#07050f">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23140b24'/%3E%3Cpath d='M17 33.5l10 10L47 22' fill='none' stroke='%23b06bff' stroke-width='7' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #07050f; --panel: rgba(255,255,255,0.045); --line: rgba(168,120,255,0.22);
    --text: #ece7ff; --muted: #948bc4; --accent: #b06bff; --accent2: #35e5ff; --danger: #ff4d6d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; min-height: 100vh; background: var(--bg); color: var(--text);
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
    display: flex; justify-content: center; position: relative; overflow-x: hidden;
  }
  body::before, body::after {
    content: ''; position: fixed; width: 60vw; height: 60vw; border-radius: 50%;
    filter: blur(90px); opacity: 0.22; z-index: 0; pointer-events: none;
  }
  body::before { background: var(--accent); top: -20%; left: -15%; }
  body::after { background: var(--accent2); bottom: -25%; right: -15%; }

  .wrap { width: 100%; max-width: 380px; padding: 100px 24px; position: relative; z-index: 1; }
  h1 {
    font-size: 24px; margin: 0; font-weight: 700; letter-spacing: 0.3px;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  p.sub { color: var(--muted); font-size: 13px; margin: 6px 0 26px; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 5px; }
  .field input {
    width: 100%; padding: 10px 12px; border: 1px solid var(--line); border-radius: 10px;
    font-size: 14px; font-family: inherit; background: var(--panel); color: var(--text);
  }
  .field input:focus { outline: none; border-color: var(--accent2); }
  .primary-btn {
    width: 100%; padding: 11px; border: none; border-radius: 10px; cursor: pointer;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    color: #07050f; font-size: 14px; font-weight: 700; margin-top: 6px;
  }
  .primary-btn:disabled { opacity: 0.5; cursor: default; }
  .msg { font-size: 13px; margin-top: 12px; padding: 9px 11px; border-radius: 8px; }
  .msg.error { background: rgba(255,77,109,0.15); color: #ff8fa3; }
  .msg.info { background: rgba(53,229,255,0.12); color: #8fe9ff; }
  .foot { margin-top: 20px; font-size: 12px; color: var(--muted); text-align: center; }
</style>
</head>
<body>

<div class="wrap">
  <h1>Organizadísimos</h1>
  <p class="sub" id="sub">Inicia sesión para entrar a tu espacio de trabajo.</p>

  <div id="form">
    <div class="field">
      <label for="email">Correo</label>
      <input type="email" id="email" autocomplete="email" placeholder="tu@correo.com">
    </div>
    <div class="field">
      <label for="password">Contraseña</label>
      <input type="password" id="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="primary-btn" id="loginBtn">Entrar</button>
  </div>

  <div id="msg"></div>
  <div class="foot">¿No tienes cuenta? Solicítala al administrador.</div>
</div>

<script>
(function () {
  const SUPABASE_URL = 'https://hwisrkincpkkdqrxuoch.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_TnJBE9EIVVra1x22ilN25Q_qgfMG1EC';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const $ = function (id) { return document.getElementById(id); };
  function show(text, type) {
    $('msg').innerHTML = text ? '<div class="msg ' + type + '">' + text + '</div>' : '';
  }

  // Enruta según el perfil: el propietario va al panel de administración,
  // el cliente a su propio espacio de trabajo.
  async function routeByRole(userId) {
    const { data: profile } = await sb
      .from('profiles').select('role, active').eq('id', userId).maybeSingle();

    // Comprueba en el servidor que el usuario Y su empresa estén activos.
    const { data: activo, error: errActivo } = await sb.rpc('is_active_user');
    if (errActivo || !activo) {
      await sb.auth.signOut();
      $('form').style.display = 'block';
      show('Tu cuenta está desactivada. Contacta al administrador.', 'error');
      return;
    }
    window.location.replace(profile && profile.role === 'owner' ? '/admin/' : '/dashboard/');
  }

  $('loginBtn').addEventListener('click', signIn);
  $('password').addEventListener('keydown', function (e) { if (e.key === 'Enter') signIn(); });

  async function signIn() {
    const email = $('email').value.trim();
    const password = $('password').value;
    if (!email || !password) { show('Completa correo y contraseña.', 'error'); return; }
    $('loginBtn').disabled = true;
    show('', '');
    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      $('loginBtn').disabled = false;
      show(error.message, 'error');
    }
    // Si va bien, onAuthStateChange redirige.
  }

  sb.auth.onAuthStateChange(function (_event, session) {
    if (session && session.user) {
      $('form').style.display = 'none';
      show('Entrando…', 'info');
      routeByRole(session.user.id);
    }
  });
})();
</script>
</body>
</html>

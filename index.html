<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de tareas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #ffffff;
    --text: #2b2b2b;
    --muted: #9a9a9a;
    --line: #ececec;
    --accent: #4a7dff;
    --hover: #f5f6f8;
    --danger: #e5484d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    justify-content: center;
  }
  .app {
    width: 100%;
    max-width: 820px;
    padding: 40px 24px 120px;
    display: none;
  }
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    gap: 10px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0;
  }
  .user-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: var(--muted);
    white-space: nowrap;
  }
  .signout-btn {
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--muted);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  .signout-btn:hover { background: var(--hover); color: var(--text); }
  .hint {
    color: var(--muted);
    font-size: 12.5px;
    margin: 0 0 20px;
    line-height: 1.6;
  }
  .hint kbd {
    background: var(--hover);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 1px 5px;
    font-family: inherit;
    font-size: 11.5px;
  }
  .projectbar {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .board-name-input {
    font-size: 17px;
    font-weight: 600;
    border: 1px solid transparent;
    border-radius: 6px;
    background: transparent;
    padding: 4px 6px;
    max-width: 260px;
    font-family: inherit;
  }
  .board-name-input:hover { background: var(--hover); }
  .board-name-input:focus { border-color: var(--accent); outline: none; background: #fff; }
  select.board-picker {
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 5px 8px;
    font-size: 13px;
    background: #fff;
    color: var(--text);
    max-width: 200px;
  }
  .small-btn {
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--muted);
    border-radius: 6px;
    padding: 5px 10px;
    font-size: 12.5px;
    cursor: pointer;
    white-space: nowrap;
  }
  .small-btn:hover { background: var(--hover); color: var(--text); }
  .share-panel {
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 18px;
    font-size: 13px;
    display: none;
  }
  .share-panel.open { display: block; }
  .share-panel h3 { margin: 0 0 8px; font-size: 13px; color: var(--muted); font-weight: 600; }
  .member-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 0;
    border-bottom: 1px solid var(--line);
  }
  .member-row:last-of-type { border-bottom: none; }
  .member-email { color: var(--text); }
  .member-tag { color: var(--muted); font-size: 11px; margin-left: 6px; }
  .member-rm { color: var(--danger); cursor: pointer; font-size: 12px; background: none; border: none; }
  .add-member-row { display: flex; gap: 6px; margin-top: 10px; }
  .add-member-row input {
    flex: 1;
    padding: 7px 9px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 13px;
    font-family: inherit;
  }
  .add-member-row button {
    padding: 7px 12px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    cursor: pointer;
  }
  #outline { }
  .node { position: relative; }
  .row {
    display: flex;
    align-items: flex-start;
    padding: 3px 6px 3px 0;
    border-radius: 4px;
  }
  .row:hover { background: var(--hover); }
  .caret {
    width: 18px;
    flex: 0 0 18px;
    text-align: center;
    color: var(--muted);
    cursor: pointer;
    user-select: none;
    font-size: 10px;
    line-height: 24px;
    visibility: hidden;
  }
  .node.has-children > .row .caret { visibility: visible; }
  .caret.hidden { visibility: hidden; cursor: default; }
  .checkbox {
    flex: 0 0 15px;
    width: 15px;
    height: 15px;
    margin-top: 5px;
    margin-right: 5px;
    border: 1px solid #c7c7c7;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    color: #fff;
    user-select: none;
  }
  .checkbox.checked {
    background: var(--accent);
    border-color: var(--accent);
  }
  .color-dot {
    flex: 0 0 11px;
    width: 11px;
    height: 11px;
    border-radius: 50%;
    margin-top: 6px;
    margin-right: 7px;
    cursor: pointer;
    border: 1px solid rgba(0,0,0,0.12);
    background: #d9d9d9;
  }
  .text {
    flex: 1;
    min-width: 0;
    line-height: 24px;
    padding: 0 4px;
    outline: none;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .text:empty::before {
    content: attr(data-placeholder);
    color: var(--muted);
  }
  .row.done .text {
    text-decoration: line-through;
    color: var(--muted);
  }
  .assignee-select {
    flex: 0 0 auto;
    font-size: 11px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--hover);
    padding: 2px 4px;
    max-width: 110px;
    color: var(--muted);
    margin-left: 8px;
    font-family: inherit;
  }
  .children {
    margin-left: 8px;
    border-left: 1px solid var(--line);
  }
  .toolbar {
    margin-top: 18px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .add-btn {
    border: 1px solid var(--line);
    background: var(--bg);
    color: var(--muted);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 13px;
    cursor: pointer;
  }
  .add-btn:hover { background: var(--hover); color: var(--text); }
  .save-status {
    font-size: 12px;
    color: var(--muted);
  }
  footer {
    margin-top: 40px;
    color: var(--muted);
    font-size: 12px;
  }

  /* Auth screen */
  #authScreen {
    width: 100%;
    max-width: 360px;
    padding: 80px 24px;
  }
  #authScreen h1 { font-size: 20px; margin-bottom: 6px; }
  #authScreen p.sub { color: var(--muted); font-size: 13px; margin: 0 0 24px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12.5px; color: var(--muted); margin-bottom: 4px; }
  .field input {
    width: 100%;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 6px;
    font-size: 14px;
    font-family: inherit;
  }
  .field input:focus { outline: none; border-color: var(--accent); }
  .primary-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: white;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 6px;
  }
  .primary-btn:hover { opacity: 0.9; }
  .primary-btn:disabled { opacity: 0.6; cursor: default; }
  .switch-mode { margin-top: 16px; font-size: 13px; color: var(--muted); text-align: center; }
  .switch-mode a { color: var(--accent); cursor: pointer; text-decoration: none; }
  .auth-msg { font-size: 13px; margin-top: 12px; padding: 8px 10px; border-radius: 6px; }
  .auth-msg.error { background: #fdecec; color: var(--danger); }
  .auth-msg.info { background: #eef4ff; color: var(--accent); }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div id="authScreen">
  <h1>Mis tareas</h1>
  <p class="sub" id="authSub">Inicia sesión para acceder a tus tareas.</p>

  <div class="field">
    <label for="authEmail">Correo</label>
    <input type="email" id="authEmail" autocomplete="email" placeholder="tu@correo.com">
  </div>
  <div class="field">
    <label for="authPassword">Contraseña</label>
    <input type="password" id="authPassword" autocomplete="current-password" placeholder="••••••••">
  </div>

  <button class="primary-btn" id="authSubmit">Iniciar sesión</button>

  <div class="switch-mode">
    <span id="switchText">¿No tienes cuenta?</span>
    <a id="switchLink">Crear una</a>
  </div>

  <div id="authMsg"></div>
</div>

<div class="app" id="appScreen">
  <div class="topbar">
    <h1>Gestor de tareas</h1>
    <div class="user-bar">
      <span id="userEmail"></span>
      <button class="signout-btn" id="signOutBtn">Cerrar sesión</button>
    </div>
  </div>

  <div class="projectbar">
    <input type="text" class="board-name-input" id="boardNameInput" placeholder="Nombre del proyecto">
    <select class="board-picker" id="boardPicker"></select>
    <button class="small-btn" id="newBoardBtn">+ Nuevo proyecto</button>
    <button class="small-btn" id="shareBtn">Compartir</button>
  </div>

  <div class="share-panel" id="sharePanel">
    <h3>Miembros de este proyecto</h3>
    <div id="memberList"></div>
    <div class="add-member-row">
      <input type="email" id="memberEmailInput" placeholder="correo@ejemplo.com">
      <button id="addMemberBtn">Agregar</button>
    </div>
  </div>

  <p class="hint">
    <kbd>Enter</kbd> nueva línea &nbsp;·&nbsp;
    <kbd>Tab</kbd> indentar &nbsp;·&nbsp;
    <kbd>Shift</kbd>+<kbd>Tab</kbd> quitar indentado &nbsp;·&nbsp;
    clic en el cuadro para tachar &nbsp;·&nbsp;
    clic en el punto de color para cambiar color
  </p>
  <div id="outline"></div>
  <div class="toolbar">
    <button class="add-btn" id="addRoot">+ Agregar elemento</button>
    <span class="save-status" id="saveStatus"></span>
  </div>
  <footer id="count"></footer>
</div>

<script>
(function () {
  // ---- Supabase setup ----
  const SUPABASE_URL = 'https://hwisrkincpkkdqrxuoch.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_TnJBE9EIVVra1x22ilN25Q_qgfMG1EC';
  const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  const COLORS = [null, 'red', 'orange', 'yellow', 'green', 'blue', 'purple'];
  const COLOR_HEX = { red: '#ef4444', orange: '#f97316', yellow: '#eab308', green: '#22c55e', blue: '#3b82f6', purple: '#a855f7' };

  const authScreen = document.getElementById('authScreen');
  const appScreen = document.getElementById('appScreen');
  const authEmail = document.getElementById('authEmail');
  const authPassword = document.getElementById('authPassword');
  const authSubmit = document.getElementById('authSubmit');
  const authMsg = document.getElementById('authMsg');
  const authSub = document.getElementById('authSub');
  const switchText = document.getElementById('switchText');
  const switchLink = document.getElementById('switchLink');
  const userEmailEl = document.getElementById('userEmail');
  const signOutBtn = document.getElementById('signOutBtn');
  const saveStatusEl = document.getElementById('saveStatus');
  const boardNameInput = document.getElementById('boardNameInput');
  const boardPicker = document.getElementById('boardPicker');
  const newBoardBtn = document.getElementById('newBoardBtn');
  const shareBtn = document.getElementById('shareBtn');
  const sharePanel = document.getElementById('sharePanel');
  const memberListEl = document.getElementById('memberList');
  const memberEmailInput = document.getElementById('memberEmailInput');
  const addMemberBtn = document.getElementById('addMemberBtn');
  const outlineEl = document.getElementById('outline');
  const countEl = document.getElementById('count');

  let authMode = 'signin';
  let currentUser = null;
  let boards = [];
  let currentBoard = null;
  let members = [];
  let tree = [];
  let saveTimer = null;

  // ---------------- Auth ----------------

  function setAuthMode(mode) {
    authMode = mode;
    authMsg.innerHTML = '';
    if (mode === 'signin') {
      authSub.textContent = 'Inicia sesión para acceder a tus tareas.';
      authSubmit.textContent = 'Iniciar sesión';
      switchText.textContent = '¿No tienes cuenta?';
      switchLink.textContent = 'Crear una';
    } else {
      authSub.textContent = 'Crea una cuenta para empezar.';
      authSubmit.textContent = 'Crear cuenta';
      switchText.textContent = '¿Ya tienes cuenta?';
      switchLink.textContent = 'Iniciar sesión';
    }
  }

  switchLink.addEventListener('click', function () {
    setAuthMode(authMode === 'signin' ? 'signup' : 'signin');
  });

  function showAuthMsg(text, type) {
    authMsg.innerHTML = '<div class="auth-msg ' + type + '">' + text + '</div>';
  }

  authSubmit.addEventListener('click', async function () {
    const email = authEmail.value.trim();
    const password = authPassword.value;
    if (!email || !password) {
      showAuthMsg('Completa correo y contraseña.', 'error');
      return;
    }
    authSubmit.disabled = true;
    authMsg.innerHTML = '';
    try {
      if (authMode === 'signin') {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else {
        const { data, error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        if (data && data.user && !data.session) {
          showAuthMsg('Cuenta creada. Revisa tu correo para confirmar antes de iniciar sesión.', 'info');
        }
      }
    } catch (err) {
      showAuthMsg(err.message || 'Algo salió mal.', 'error');
    } finally {
      authSubmit.disabled = false;
    }
  });

  signOutBtn.addEventListener('click', async function () {
    await sb.auth.signOut();
  });

  sb.auth.onAuthStateChange(function (event, session) {
    if (session && session.user) {
      currentUser = session.user;
      authScreen.classList.add('hidden');
      appScreen.style.display = 'block';
      userEmailEl.textContent = currentUser.email;
      bootstrap();
    } else {
      currentUser = null;
      appScreen.style.display = 'none';
      authScreen.classList.remove('hidden');
      setAuthMode('signin');
    }
  });

  // ---------------- Data helpers ----------------

  function uid() {
    return 'n' + Math.random().toString(36).slice(2, 10) + Date.now().toString(36);
  }

  function defaultTree() {
    return [{ id: uid(), text: '', children: [], collapsed: false, done: false, color: null, assignee: null }];
  }

  function ensureFields(nodes) {
    (nodes || []).forEach(function (n) {
      if (typeof n.done === 'undefined') n.done = false;
      if (typeof n.color === 'undefined') n.color = null;
      if (typeof n.assignee === 'undefined') n.assignee = null;
      if (!n.children) n.children = [];
      ensureFields(n.children);
    });
    return nodes;
  }

  // ---------------- Boards / projects ----------------

  async function bootstrap() {
    await loadBoardsList();
    const lastId = localStorage.getItem('lastBoard_' + currentUser.id);
    const found = boards.find(function (b) { return b.id === lastId; });
    await switchBoard(found ? found.id : boards[0].id);
  }

  async function loadBoardsList() {
    const { data, error } = await sb.from('boards').select('id, name, owner_id').order('name');
    if (error) {
      saveStatusEl.textContent = 'Error: ' + error.message;
      boards = [];
      return;
    }
    boards = data || [];
    if (!boards.length) {
      const { data: newBoard, error: insErr } = await sb
        .from('boards')
        .insert({ owner_id: currentUser.id, name: 'Mis tareas', data: defaultTree() })
        .select('id, name, owner_id')
        .single();
      if (!insErr && newBoard) boards = [newBoard];
    }
  }

  function renderBoardPicker() {
    boardPicker.innerHTML = '';
    boards.forEach(function (b) {
      const opt = document.createElement('option');
      opt.value = b.id;
      opt.textContent = b.name + (b.owner_id !== currentUser.id ? ' (compartido)' : '');
      if (currentBoard && b.id === currentBoard.id) opt.selected = true;
      boardPicker.appendChild(opt);
    });
  }

  boardPicker.addEventListener('change', function () {
    switchBoard(boardPicker.value);
  });

  newBoardBtn.addEventListener('click', async function () {
    const name = window.prompt('Nombre del nuevo proyecto:', 'Nuevo proyecto');
    if (!name) return;
    const { data, error } = await sb
      .from('boards')
      .insert({ owner_id: currentUser.id, name: name, data: defaultTree() })
      .select('id, name, owner_id')
      .single();
    if (error) { alert('No se pudo crear: ' + error.message); return; }
    boards.push(data);
    await switchBoard(data.id);
  });

  boardNameInput.addEventListener('change', async function () {
    const newName = boardNameInput.value.trim();
    if (!newName || !currentBoard) return;
    currentBoard.name = newName;
    const found = boards.find(function (b) { return b.id === currentBoard.id; });
    if (found) found.name = newName;
    renderBoardPicker();
    await sb.from('boards').update({ name: newName }).eq('id', currentBoard.id);
  });

  async function switchBoard(boardId) {
    const { data, error } = await sb.from('boards').select('*').eq('id', boardId).single();
    if (error || !data) {
      saveStatusEl.textContent = 'Error al cargar proyecto.';
      return;
    }
    currentBoard = data;
    localStorage.setItem('lastBoard_' + currentUser.id, currentBoard.id);
    tree = ensureFields(currentBoard.data && currentBoard.data.length ? currentBoard.data : defaultTree());
    boardNameInput.value = currentBoard.name;
    renderBoardPicker();
    await loadMembers();
    renderSharePanel();
    render();
  }

  // ---------------- Sharing / members ----------------

  async function loadMembers() {
    members = [];
    if (!currentBoard) return;
    const { data: ownerProfile } = await sb.from('profiles').select('id, email').eq('id', currentBoard.owner_id).maybeSingle();
    if (ownerProfile) members.push({ id: ownerProfile.id, email: ownerProfile.email, isOwner: true });

    const { data: memberRows } = await sb.from('board_members').select('user_id').eq('board_id', currentBoard.id);
    const ids = (memberRows || []).map(function (r) { return r.user_id; });
    if (ids.length) {
      const { data: profs } = await sb.from('profiles').select('id, email').in('id', ids);
      (profs || []).forEach(function (p) { members.push({ id: p.id, email: p.email, isOwner: false }); });
    }
  }

  function renderSharePanel() {
    memberListEl.innerHTML = '';
    const isOwner = currentBoard && currentBoard.owner_id === currentUser.id;
    members.forEach(function (m) {
      const row = document.createElement('div');
      row.className = 'member-row';
      const label = document.createElement('span');
      label.className = 'member-email';
      label.textContent = m.email;
      if (m.isOwner) {
        const tag = document.createElement('span');
        tag.className = 'member-tag';
        tag.textContent = '(dueño)';
        label.appendChild(tag);
      }
      row.appendChild(label);
      if (isOwner && !m.isOwner) {
        const rm = document.createElement('button');
        rm.className = 'member-rm';
        rm.textContent = 'Quitar';
        rm.addEventListener('click', async function () {
          await sb.from('board_members').delete().eq('board_id', currentBoard.id).eq('user_id', m.id);
          await loadMembers();
          renderSharePanel();
          render();
        });
        row.appendChild(rm);
      }
      memberListEl.appendChild(row);
    });
    addMemberBtn.parentElement.style.display = isOwner ? 'flex' : 'none';
  }

  shareBtn.addEventListener('click', function () {
    sharePanel.classList.toggle('open');
  });

  addMemberBtn.addEventListener('click', async function () {
    const email = memberEmailInput.value.trim();
    if (!email) return;
    const { data: profile } = await sb.from('profiles').select('id').eq('email', email).maybeSingle();
    if (!profile) {
      alert('Ese correo no tiene una cuenta creada en la app todavía.');
      return;
    }
    if (profile.id === currentBoard.owner_id) {
      alert('Esa persona ya es el dueño del proyecto.');
      return;
    }
    if (members.some(function (m) { return m.id === profile.id; })) {
      alert('Ya es miembro de este proyecto.');
      return;
    }
    const { error } = await sb.from('board_members').insert({ board_id: currentBoard.id, user_id: profile.id });
    if (error) { alert('No se pudo agregar: ' + error.message); return; }
    memberEmailInput.value = '';
    await loadMembers();
    renderSharePanel();
    render();
  });

  // ---------------- Save ----------------

  function save() {
    clearTimeout(saveTimer);
    saveStatusEl.textContent = 'Guardando...';
    saveTimer = setTimeout(async function () {
      if (!currentBoard) return;
      const { error } = await sb.from('boards').update({ data: tree, updated_at: new Date().toISOString() }).eq('id', currentBoard.id);
      saveStatusEl.textContent = error ? ('Error al guardar: ' + error.message) : 'Guardado';
      if (!error) {
        setTimeout(function () { if (saveStatusEl.textContent === 'Guardado') saveStatusEl.textContent = ''; }, 1500);
      }
    }, 400);
  }

  // ---------------- Tree helpers ----------------

  function findPath(id, nodes, trail) {
    nodes = nodes || tree;
    trail = trail || [];
    for (let i = 0; i < nodes.length; i++) {
      const newTrail = trail.concat([{ nodes: nodes, index: i }]);
      if (nodes[i].id === id) return newTrail;
      if (nodes[i].children.length) {
        const res = findPath(id, nodes[i].children, newTrail);
        if (res) return res;
      }
    }
    return null;
  }

  function visibleOrder(nodes, out) {
    nodes = nodes || tree;
    out = out || [];
    nodes.forEach(function (n) {
      out.push(n.id);
      if (n.children.length && !n.collapsed) visibleOrder(n.children, out);
    });
    return out;
  }

  function countAll(nodes) {
    nodes = nodes || tree;
    let c = 0, done = 0;
    nodes.forEach(function (n) {
      c += 1;
      if (n.done) done += 1;
      if (n.children.length) {
        const sub = countAll(n.children);
        c += sub.total;
        done += sub.done;
      }
    });
    return { total: c, done: done };
  }

  function indent(id) {
    const path = findPath(id);
    if (!path) return;
    const last = path[path.length - 1];
    if (last.index === 0) return;
    const node = last.nodes.splice(last.index, 1)[0];
    const prevSibling = last.nodes[last.index - 1];
    prevSibling.children.push(node);
    prevSibling.collapsed = false;
  }

  function outdent(id) {
    const path = findPath(id);
    if (!path || path.length < 2) return;
    const last = path[path.length - 1];
    const parentInfo = path[path.length - 2];
    const node = last.nodes.splice(last.index, 1)[0];
    parentInfo.nodes.splice(parentInfo.index + 1, 0, node);
  }

  function getCaretOffset(el) {
    const sel = window.getSelection();
    if (!sel.rangeCount) return 0;
    const range = sel.getRangeAt(0);
    const preRange = range.cloneRange();
    preRange.selectNodeContents(el);
    preRange.setEnd(range.endContainer, range.endOffset);
    return preRange.toString().length;
  }

  function setCaretOffset(el, offset) {
    const range = document.createRange();
    const sel = window.getSelection();
    let node = el.firstChild;
    if (!node) {
      node = document.createTextNode('');
      el.appendChild(node);
    }
    const len = node.textContent.length;
    const off = Math.max(0, Math.min(offset, len));
    range.setStart(node, off);
    range.collapse(true);
    sel.removeAllRanges();
    sel.addRange(range);
  }

  function focusNode(id, offset) {
    requestAnimationFrame(function () {
      const el = outlineEl.querySelector('.text[data-id="' + id + '"]');
      if (el) {
        el.focus();
        setCaretOffset(el, offset || 0);
      }
    });
  }

  // ---------------- Rendering ----------------

  function renderNode(node, depth) {
    const wrap = document.createElement('div');
    wrap.className = 'node' + (node.children.length ? ' has-children' : '');
    wrap.dataset.id = node.id;

    const row = document.createElement('div');
    row.className = 'row' + (node.done ? ' done' : '');
    row.style.paddingLeft = (depth * 20) + 'px';

    const caret = document.createElement('span');
    caret.className = 'caret' + (node.children.length ? '' : ' hidden');
    caret.textContent = node.collapsed ? '▸' : '▾';
    caret.addEventListener('click', function () {
      node.collapsed = !node.collapsed;
      save();
      render();
    });

    const checkbox = document.createElement('span');
    checkbox.className = 'checkbox' + (node.done ? ' checked' : '');
    checkbox.textContent = node.done ? '✓' : '';
    checkbox.title = 'Marcar como completada';
    checkbox.addEventListener('click', function () {
      node.done = !node.done;
      save();
      render();
    });

    const colorDot = document.createElement('span');
    colorDot.className = 'color-dot';
    colorDot.title = 'Cambiar color';
    if (node.color) colorDot.style.background = COLOR_HEX[node.color];
    colorDot.addEventListener('click', function () {
      const idx = COLORS.indexOf(node.color);
      node.color = COLORS[(idx + 1) % COLORS.length];
      save();
      render();
    });

    const text = document.createElement('div');
    text.className = 'text';
    text.contentEditable = 'true';
    text.dataset.id = node.id;
    text.dataset.placeholder = 'Escribe algo...';
    text.textContent = node.text;

    const assigneeSelect = document.createElement('select');
    assigneeSelect.className = 'assignee-select';
    assigneeSelect.title = 'Asignar responsable';
    const noneOpt = document.createElement('option');
    noneOpt.value = '';
    noneOpt.textContent = 'Sin asignar';
    assigneeSelect.appendChild(noneOpt);
    members.forEach(function (m) {
      const opt = document.createElement('option');
      opt.value = m.id;
      opt.textContent = m.email.split('@')[0] + (m.isOwner ? ' (dueño)' : '');
      if (node.assignee === m.id) opt.selected = true;
      assigneeSelect.appendChild(opt);
    });
    if (!node.assignee) noneOpt.selected = true;
    assigneeSelect.addEventListener('change', function () {
      node.assignee = assigneeSelect.value || null;
      save();
    });

    row.appendChild(caret);
    row.appendChild(checkbox);
    row.appendChild(colorDot);
    row.appendChild(text);
    row.appendChild(assigneeSelect);
    wrap.appendChild(row);

    if (node.children.length && !node.collapsed) {
      const childrenEl = document.createElement('div');
      childrenEl.className = 'children';
      node.children.forEach(function (c) {
        childrenEl.appendChild(renderNode(c, depth + 1));
      });
      wrap.appendChild(childrenEl);
    }

    return wrap;
  }

  function render() {
    if (tree.length === 0) {
      tree.push({ id: uid(), text: '', children: [], collapsed: false, done: false, color: null, assignee: null });
    }
    outlineEl.innerHTML = '';
    tree.forEach(function (n) {
      outlineEl.appendChild(renderNode(n, 0));
    });
    const counts = countAll(tree);
    countEl.textContent = counts.total + ' elemento(s) · ' + counts.done + ' completada(s)';
  }

  outlineEl.addEventListener('input', function (e) {
    const el = e.target.closest('.text');
    if (!el) return;
    const path = findPath(el.dataset.id);
    if (!path) return;
    const last = path[path.length - 1];
    last.nodes[last.index].text = el.textContent;
    save();
  });

  outlineEl.addEventListener('keydown', function (e) {
    const el = e.target.closest('.text');
    if (!el) return;
    const id = el.dataset.id;

    if (e.key === 'Enter') {
      e.preventDefault();
      const offset = getCaretOffset(el);
      const fullText = el.textContent;
      const before = fullText.slice(0, offset);
      const after = fullText.slice(offset);
      const path = findPath(id);
      const last = path[path.length - 1];
      const node = last.nodes[last.index];
      node.text = before;
      const newNode = { id: uid(), text: after, children: [], collapsed: false, done: false, color: null, assignee: null };
      if (node.children.length && !node.collapsed && offset === fullText.length) {
        node.children.unshift(newNode);
      } else {
        last.nodes.splice(last.index + 1, 0, newNode);
      }
      save();
      render();
      focusNode(newNode.id, 0);
    } else if (e.key === 'Tab') {
      e.preventDefault();
      const offset = getCaretOffset(el);
      if (e.shiftKey) outdent(id); else indent(id);
      save();
      render();
      focusNode(id, offset);
    } else if (e.key === 'Backspace') {
      const offset = getCaretOffset(el);
      if (offset === 0) {
        const order = visibleOrder();
        const idx = order.indexOf(id);
        if (idx === 0) return;
        e.preventDefault();
        const prevId = order[idx - 1];
        const path = findPath(id);
        const last = path[path.length - 1];
        const node = last.nodes[last.index];
        const prevPath = findPath(prevId);
        const prevLast = prevPath[prevPath.length - 1];
        const prevNode = prevLast.nodes[prevLast.index];
        const mergeOffset = prevNode.text.length;
        prevNode.text = prevNode.text + node.text;
        prevNode.children = prevNode.children.concat(node.children);
        if (node.children.length) prevNode.collapsed = false;
        last.nodes.splice(last.index, 1);
        save();
        render();
        focusNode(prevId, mergeOffset);
      }
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      const order = visibleOrder();
      const idx = order.indexOf(id);
      if (idx > 0) {
        const offset = getCaretOffset(el);
        focusNode(order[idx - 1], offset);
      }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      const order = visibleOrder();
      const idx = order.indexOf(id);
      if (idx < order.length - 1) {
        const offset = getCaretOffset(el);
        focusNode(order[idx + 1], offset);
      }
    }
  });

  document.getElementById('addRoot').addEventListener('click', function () {
    const newNode = { id: uid(), text: '', children: [], collapsed: false, done: false, color: null, assignee: null };
    tree.push(newNode);
    save();
    render();
    focusNode(newNode.id, 0);
  });

  setAuthMode('signin');
})();
</script>
</body>
</html>

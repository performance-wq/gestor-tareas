<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Organizadísimos · Proyectos</title>
<meta name="theme-color" content="#07050f">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%23140b24'/%3E%3Cpath d='M17 33.5l10 10L47 22' fill='none' stroke='%23b06bff' stroke-width='7' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#07050f;--panel:rgba(255,255,255,.045);--panel2:rgba(255,255,255,.08);--line:rgba(168,120,255,.22);--text:#ece7ff;--muted:#948bc4;--accent:#b06bff;--accent2:#35e5ff;--danger:#ff4d6d;--ok:#2ee6a6}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;background:var(--bg);color:var(--text);font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Roboto,Helvetica,Arial,sans-serif;display:flex;justify-content:center;position:relative;overflow-x:hidden}
  body::before,body::after{content:'';position:fixed;width:60vw;height:60vw;border-radius:50%;filter:blur(90px);opacity:.2;z-index:0;pointer-events:none}
  body::before{background:var(--accent);top:-20%;left:-15%}
  body::after{background:var(--accent2);bottom:-25%;right:-15%}
  h1{font-size:22px;margin:0;font-weight:700;background:linear-gradient(90deg,var(--accent2),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent}
  .wrap{width:100%;max-width:960px;min-width:0;padding:30px 22px 80px;position:relative;z-index:1}
  #loginView{max-width:380px}
  .topbar{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap}
  .user-bar{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);flex-wrap:wrap;min-width:0;max-width:100%}
  .user-bar #whoami{min-width:0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nav{display:flex;gap:6px;margin:14px 0 22px}
  .nav a{font-size:13px;padding:6px 14px;border-radius:9px;text-decoration:none;color:var(--muted);border:1px solid transparent}
  .nav a:hover{color:var(--text)}
  .nav a.on{color:var(--text);border-color:var(--line);background:var(--panel)}
  .btn{border:1px solid var(--line);background:var(--panel);color:var(--text);border-radius:8px;padding:6px 12px;font-size:12.5px;cursor:pointer;font-family:inherit;white-space:nowrap;text-decoration:none;display:inline-block}
  .btn:hover{border-color:var(--accent2)}
  .btn.danger{color:var(--danger);border-color:rgba(255,77,109,.4)}
  .pbtn{border:none;border-radius:9px;padding:9px 16px;background:linear-gradient(90deg,var(--accent),var(--accent2));color:#07050f;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  .pbtn:disabled{opacity:.5}
  input,textarea,select{border:1px solid var(--line);border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit;background:var(--panel);color:var(--text);outline:none;width:100%}
  input:focus,textarea:focus,select:focus{border-color:var(--accent2)}
  select option{background:#12102a}
  .msg{font-size:13px;margin-top:12px;padding:9px 11px;border-radius:8px}
  .msg.error{background:rgba(255,77,109,.15);color:#ff8fa3}
  .msg.ok{background:rgba(46,230,166,.14);color:#8ff5d2}
  .field{margin-bottom:13px}
  .field label{display:block;font-size:12.5px;color:var(--muted);margin-bottom:5px}
  .card{border:1px solid var(--line);border-radius:14px;padding:16px;background:var(--panel);margin-bottom:14px}
  .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .hint{font-size:11.5px;color:var(--muted)}
  .row{display:flex;align-items:center;gap:9px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:9px}
  .bar{height:6px;border-radius:4px;background:rgba(255,255,255,.08);overflow:hidden}
  .bar>i{display:block;height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .3s}
  .bar.full>i{background:var(--ok)}
  .pill{font-size:10.5px;border-radius:8px;padding:2px 8px;font-weight:600;white-space:nowrap;border:1px solid}
  .p-pending{color:var(--muted);border-color:var(--line)}
  .p-progress{color:var(--accent2);border-color:rgba(53,229,255,.4)}
  .p-done{color:#8ff5d2;border-color:rgba(46,230,166,.4)}
  .dot{width:13px;height:13px;border-radius:50%;border:1px solid var(--line);cursor:pointer;flex:0 0 auto}
  .dot.on{background:var(--ok);border-color:var(--ok)}
  .dot.mid{background:rgba(53,229,255,.5);border-color:var(--accent2)}
  .tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:18px}
  .tabs button{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-size:13.5px;padding:9px 15px;cursor:pointer;font-family:inherit;margin-bottom:-1px}
  .tabs button.on{color:var(--text);border-bottom-color:var(--accent)}
  /* ---- Áreas y tareas: lista compacta estilo Linear/ClickUp ---- */
  .area{border:1px solid var(--line);border-radius:9px;margin-bottom:8px;overflow:hidden}
  .area-h{display:flex;align-items:center;gap:7px;padding:5px 8px 5px 6px;background:var(--panel2);border-bottom:1px solid var(--line);flex-wrap:wrap;cursor:pointer}
  .area-h.plegada{border-bottom:none}
  .area-chev{flex:0 0 auto;width:11px;text-align:center;color:var(--muted);font-size:9px;transition:transform .18s ease;user-select:none}
  .area-chev.abierta{transform:rotate(90deg)}
  .area-h b{font-size:12.5px}
  .area-h .cnt{font-size:11px;color:var(--muted);margin-left:auto}
  .area-bar{flex:0 0 auto;width:52px;height:4px;border-radius:3px;background:rgba(255,255,255,.08);overflow:hidden}
  .area-bar>i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s}
  .area-bar.full>i{background:var(--ok)}
  .area-pct{font-size:10.5px;color:var(--muted);white-space:nowrap;min-width:30px}
  .area-h .btn{padding:3px 9px}
  .task{border-bottom:1px solid var(--line)}
  .task:last-child{border-bottom:none}
  .task.dragging,.sub.dragging{opacity:.4}
  .task-top{display:flex;align-items:center;gap:6px;padding:2px 8px 2px 6px;min-height:29px;position:relative}
  .task-top:hover{background:rgba(255,255,255,.03)}
  .drop-antes{box-shadow:inset 0 2px 0 0 var(--accent2)}
  .drop-despues{box-shadow:inset 0 -2px 0 0 var(--accent2)}
  .grip{flex:0 0 auto;width:12px;text-align:center;cursor:grab;color:var(--muted);font-size:12px;line-height:1;opacity:0;user-select:none}
  .task-top:hover .grip,.sub:hover .grip{opacity:.55}
  .grip:active{cursor:grabbing}
  .task-name{flex:1;min-width:0;background:none;border:none;padding:0;font-size:13px;font-weight:600;color:var(--text)}
  .task.done .task-name{text-decoration:line-through;color:var(--muted)}
  .task-pct{font-size:10.5px;color:var(--muted);white-space:nowrap}
  .sub{display:flex;align-items:center;gap:6px;padding:2px 8px 2px 20px;min-height:25px;position:relative}
  .sub:hover{background:rgba(255,255,255,.03)}
  .sub input{flex:1;min-width:0;background:none;border:none;padding:0;font-size:12px}
  .sub.done input{text-decoration:line-through;color:var(--muted)}
  .x{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:0 3px;line-height:1}
  .x:hover{color:var(--danger)}
  .detail{border-top:1px dashed var(--line);margin:0 8px 8px;padding-top:9px;display:flex;flex-direction:column;gap:9px}
  .track{border:1px solid var(--line);border-radius:8px;padding:9px;background:rgba(0,0,0,.25)}
  .empty{color:var(--muted);font-size:12.5px;padding:7px 2px}
  .plist a{display:flex;align-items:center;gap:11px;padding:12px 14px;border:1px solid var(--line);border-radius:11px;margin-bottom:9px;text-decoration:none;color:var(--text);background:var(--panel)}
  .plist a:hover{border-color:var(--accent2)}
  .tag{background:rgba(176,107,255,.14);color:#d9bcff;border-radius:7px;padding:2px 8px;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
  /* ---- Bitácora: línea de tiempo cronológica ---- */
  .form-log{border:1px solid var(--line);border-radius:10px;padding:12px;background:var(--panel);margin:8px 0 16px}
  .timeline{position:relative;margin:0 0 0 5px;padding-left:16px;border-left:1px solid var(--line)}
  .tl-item{position:relative;padding:5px 6px 5px 4px;cursor:pointer;border-radius:6px}
  .tl-item:hover{background:rgba(255,255,255,.03)}
  .tl-dot{position:absolute;left:-21px;top:9px;width:9px;height:9px;border-radius:50%;border:2px solid var(--bg);box-sizing:content-box}
  .tl-head{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap}
  .tl-area{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
  .tl-date{font-size:11px;color:var(--muted)}
  .tl-x{margin-left:auto;opacity:0;font-size:11px}
  .tl-item:hover .tl-x{opacity:.6}
  .tl-sum{font-size:12.5px;color:var(--text);margin-top:1px}
  .tl-detail{margin-top:8px;display:flex;flex-direction:column;gap:8px;cursor:default}
  .tl-field .lbl{margin-bottom:2px}
  .tl-field .val{font-size:13px;white-space:pre-wrap;line-height:1.4}
  /* ---- Estado del proyecto ---- */
  .pstatus{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);border:1px solid var(--line);border-radius:8px;padding:2px 9px;white-space:nowrap;flex:0 0 auto}
  .pstatus-dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
  .estado-select{width:auto;padding:5px 9px;font-size:12px;border-radius:9px}
  /* ---- Menú de acciones (⋮) ---- */
  .menu-wrap{position:relative;flex:0 0 auto}
  .menu-btn{background:none;border:1px solid var(--line);color:var(--muted);border-radius:8px;width:28px;height:28px;cursor:pointer;font-size:15px;line-height:1;padding:0}
  .menu-btn:hover{color:var(--text);border-color:var(--accent2)}
  .menu-pop{position:absolute;right:0;top:32px;z-index:40;min-width:180px;background:#141018;border:1px solid var(--line);border-radius:10px;padding:5px;box-shadow:0 8px 26px rgba(0,0,0,.55)}
  .menu-pop button{display:block;width:100%;text-align:left;background:none;border:none;color:var(--text);font-size:12.5px;padding:8px 10px;border-radius:7px;cursor:pointer;font-family:inherit}
  .menu-pop button:hover{background:rgba(255,255,255,.06)}
  .menu-pop button.danger{color:var(--danger)}
  .hidden{display:none!important}
</style>
</head>
<body>

<div class="wrap hidden" id="loginView">
  <h1>Organizadísimos</h1>
  <p class="hint" style="margin:6px 0 22px">Inicia sesión para entrar a tus proyectos.</p>
  <div class="field"><label>Correo</label><input type="email" id="email" placeholder="tu@correo.com"></div>
  <div class="field"><label>Contraseña</label><input type="password" id="password" placeholder="••••••••"></div>
  <button class="pbtn" style="width:100%" id="loginBtn">Entrar</button>
  <div id="loginMsg"></div>
</div>

<div class="wrap hidden" id="appView">
  <div class="topbar">
    <h1>Organizadísimos</h1>
    <div class="user-bar"><span id="whoami"></span><button class="btn" id="outBtn">Salir</button></div>
  </div>
  <div class="nav">
    <a href="/dashboard/">Tareas</a>
    <a href="/proyectos/" class="on">Proyectos</a>
  </div>
  <div id="body"></div>
</div>

<script>
(function () {
  var URL_SB = 'https://hwisrkincpkkdqrxuoch.supabase.co';
  var KEY = 'sb_publishable_TnJBE9EIVVra1x22ilN25Q_qgfMG1EC';
  var sb = window.supabase.createClient(URL_SB, KEY);
  var $ = function (i) { return document.getElementById(i); };

  var me = null, cuenta = null, proyectos = [], actual = null;
  var areas = [], tareas = [], bitacora = [], pestana = 'tareas', abierta = null, bloqueo = null;
  var arrastreId = null, arrastreTabla = null, logAbierto = null, areasAbiertas = {};

  function msg(el, t, k) { el.innerHTML = t ? '<div class="msg ' + k + '">' + t + '</div>' : ''; }
  function el(tag, cls, txt) { var e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; }
  function hoy() { var d = new Date(); return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0'); }

  // ---------------- Estado del proyecto ----------------
  var ESTADOS = [
    { v: 'active',    lbl: 'Activo',     emoji: '🟢', dot: '#2ee6a6' },
    { v: 'pending',   lbl: 'Pendiente',  emoji: '🟡', dot: '#f7d154' },
    { v: 'on_hold',   lbl: 'En espera',  emoji: '🟠', dot: '#ff9f43' },
    { v: 'done',      lbl: 'Finalizado', emoji: '🔵', dot: '#35e5ff' },
    { v: 'cancelled', lbl: 'Cancelado',  emoji: '🔴', dot: '#ff4d6d' }
  ];
  function estadoInfo(v) { for (var i = 0; i < ESTADOS.length; i++) if (ESTADOS[i].v === v) return ESTADOS[i]; return ESTADOS[0]; }
  function pillEstado(v) {
    var e = estadoInfo(v), s = el('span', 'pstatus');
    var d = el('span', 'pstatus-dot'); d.style.background = e.dot;
    s.appendChild(d); s.appendChild(document.createTextNode(e.lbl));
    return s;
  }

  // ---------------- Menú de acciones (⋮) ----------------
  document.addEventListener('click', function () {
    document.querySelectorAll('.menu-pop').forEach(function (p) { p.classList.add('hidden'); });
  });
  function menuAcciones(items) {
    var wrap = el('div', 'menu-wrap');
    var btn = el('button', 'menu-btn', '⋮'); btn.title = 'Acciones'; btn.type = 'button';
    var pop = el('div', 'menu-pop hidden');
    items.forEach(function (it) {
      var b = el('button', it.danger ? 'danger' : '', it.label); b.type = 'button';
      b.onclick = function (ev) { ev.preventDefault(); ev.stopPropagation(); pop.classList.add('hidden'); it.onClick(); };
      pop.appendChild(b);
    });
    btn.onclick = function (ev) {
      ev.preventDefault(); ev.stopPropagation();
      var abrir = pop.classList.contains('hidden');
      document.querySelectorAll('.menu-pop').forEach(function (p) { p.classList.add('hidden'); });
      if (abrir) pop.classList.remove('hidden');
    };
    wrap.appendChild(btn); wrap.appendChild(pop);
    return wrap;
  }

  // ---------------- Duplicar / Eliminar ----------------
  // Copia la estructura (áreas, tareas, subtareas, prioridades, indicadores de
  // seguimiento) pero NO el avance, responsables, fechas ni bitácora: el nuevo
  // proyecto nace limpio, listo para reutilizarse como plantilla.
  async function duplicarProyecto(p) {
    var res = await Promise.all([
      sb.from('project_areas').select('*').eq('project_id', p.id).order('position'),
      sb.from('project_tasks').select('*').eq('project_id', p.id).order('position')
    ]);
    var oAreas = res[0].data || [], oTasks = res[1].data || [];

    var np = await sb.from('projects').insert({
      name: p.name + ' (copia)', description: p.description || null,
      account_id: cuenta, owner_id: me.id, status: 'pending'
    }).select('id').single();
    if (np.error) { alert('No se pudo duplicar: ' + np.error.message); return null; }
    var nid = np.data.id, areaMap = {}, taskMap = {};

    for (var i = 0; i < oAreas.length; i++) {
      var a = oAreas[i];
      var ra = await sb.from('project_areas').insert({ project_id: nid, account_id: cuenta, name: a.name, position: a.position }).select('id').single();
      if (!ra.error) areaMap[a.id] = ra.data.id;
    }

    function limpiaTracking(tr) { return (Array.isArray(tr) ? tr : []).map(function (m) { return { label: m.label, value: '' }; }); }
    function copiaTarea(t, parentNuevo) {
      return sb.from('project_tasks').insert({
        project_id: nid, account_id: cuenta,
        area_id: t.area_id ? (areaMap[t.area_id] || null) : null,
        parent_id: parentNuevo,
        name: t.name, description: t.description || null,
        responsible: null, priority: t.priority, due_date: null, status: 'pending',
        tracking_enabled: t.tracking_enabled, tracking: limpiaTracking(t.tracking),
        position: t.position
      }).select('id').single();
    }
    var padres = oTasks.filter(function (t) { return !t.parent_id; });
    var hijas = oTasks.filter(function (t) { return t.parent_id; });
    for (var j = 0; j < padres.length; j++) { var rp = await copiaTarea(padres[j], null); if (!rp.error) taskMap[padres[j].id] = rp.data.id; }
    for (var k = 0; k < hijas.length; k++) { var rh = await copiaTarea(hijas[k], taskMap[hijas[k].parent_id] || null); if (!rh.error) taskMap[hijas[k].id] = rh.data.id; }

    return nid;
  }
  async function accionDuplicar(p) {
    var nid = await duplicarProyecto(p);
    if (nid) { history.pushState({}, '', '?p=' + nid); verProyecto(nid); }
  }
  async function accionEliminar(p) {
    if (!confirm('¿Estás seguro de eliminar este proyecto?\nEsta acción no se puede deshacer.')) return;
    var r = await sb.from('projects').delete().eq('id', p.id);
    if (r.error) { alert('No se pudo eliminar: ' + r.error.message); return; }
    history.pushState({}, '', '/proyectos/');
    listaProyectos();
  }

  // ---------------- Acceso ----------------
  $('loginBtn').addEventListener('click', entrar);
  $('password').addEventListener('keydown', function (e) { if (e.key === 'Enter') entrar(); });
  $('outBtn').addEventListener('click', function () { sb.auth.signOut(); });

  async function entrar() {
    var e = $('email').value.trim(), p = $('password').value;
    if (!e || !p) { msg($('loginMsg'), 'Completa correo y contraseña.', 'error'); return; }
    $('loginBtn').disabled = true; msg($('loginMsg'), '', '');
    var r = await sb.auth.signInWithPassword({ email: e, password: p });
    $('loginBtn').disabled = false;
    if (r.error) msg($('loginMsg'), r.error.message, 'error');
  }

  sb.auth.onAuthStateChange(async function (_ev, s) {
    if (s && s.user) {
      // Mismo guard que el resto: usuario Y empresa deben estar activos.
      var a = await sb.rpc('is_active_user');
      if (a.error || !a.data) {
        bloqueo = 'Tu cuenta está desactivada. Contacta al administrador.';
        await sb.auth.signOut(); return;
      }
      me = s.user;
      var pr = await sb.from('profiles').select('account_id').eq('id', me.id).maybeSingle();
      cuenta = pr.data ? pr.data.account_id : null;
      $('whoami').textContent = me.email;
      $('loginView').classList.add('hidden');
      $('appView').classList.remove('hidden');
      abrirDesdeURL();
    } else {
      me = null;
      $('appView').classList.add('hidden');
      $('loginView').classList.remove('hidden');
      if (bloqueo) { msg($('loginMsg'), bloqueo, 'error'); bloqueo = null; }
    }
  });

  // ---------------- Avance (derivado, nunca guardado) ----------------
  function porPos(a, b) { return (a.position || 0) - (b.position || 0); }
  function hijas(id) { return tareas.filter(function (t) { return t.parent_id === id; }).sort(porPos); }
  function raiz() { return tareas.filter(function (t) { return !t.parent_id; }).sort(porPos); }
  function avance(t) {
    var h = hijas(t.id);
    if (h.length) return h.filter(function (s) { return s.status === 'done'; }).length / h.length;
    return t.status === 'done' ? 1 : 0;
  }
  function estado(t) {
    var h = hijas(t.id);
    if (!h.length) return t.status;
    var d = h.filter(function (s) { return s.status === 'done'; }).length;
    if (d === h.length) return 'done';
    if (d > 0 || h.some(function (s) { return s.status === 'in_progress'; })) return 'in_progress';
    return 'pending';
  }
  function avanceProyecto() {
    var r = raiz(); if (!r.length) return 0;
    return r.reduce(function (a, t) { return a + avance(t); }, 0) / r.length;
  }
  var ETIQ = { pending: 'Pendiente', in_progress: 'En proceso', done: 'Completado' };

  // ---------------- Acordeón de etapas (áreas) ----------------
  // Cada etapa se pliega/despliega. Por defecto TODAS contraídas al abrir el
  // proyecto; solo se recuerdan las que el usuario expande. Se guarda por
  // proyecto en localStorage, así el estado sobrevive re-render y recarga
  // mientras el usuario sigue en ese proyecto.
  function claveAreas() { return 'areasAbiertas_' + (actual ? actual.id : ''); }
  function cargarAreasAbiertas() {
    try { areasAbiertas = JSON.parse(localStorage.getItem(claveAreas()) || '{}') || {}; }
    catch (_) { areasAbiertas = {}; }
  }
  function guardarAreasAbiertas() {
    try { localStorage.setItem(claveAreas(), JSON.stringify(areasAbiertas)); } catch (_) {}
  }
  function areaAbierta(key) { return !!areasAbiertas[key]; }
  function abrirArea(key) { areasAbiertas[key] = true; guardarAreasAbiertas(); }
  function toggleArea(key) {
    if (areasAbiertas[key]) delete areasAbiertas[key]; else areasAbiertas[key] = true;
    guardarAreasAbiertas(); pintar();
  }

  // ---------------- Navegación ----------------
  function abrirDesdeURL() {
    var id = new URLSearchParams(location.search).get('p');

  // ---------------- Reordenar con Drag & Drop ----------------
  // El orden se guarda en la columna position, igual que antes; solo cambia la
  // interacción (arrastrar en vez de flechas). Un elemento solo puede soltarse
  // dentro de su propia lista de hermanos: el arrastre se identifica por tabla
  // y se comprueba que el id arrastrado pertenezca a la lista de destino.
  function limpiarDrop() {
    document.querySelectorAll('.drop-antes, .drop-despues').forEach(function (n) {
      n.classList.remove('drop-antes', 'drop-despues');
    });
  }

  function reordenar(lista, fromId, toId, antes, tabla) {
    if (fromId === toId) return;
    var from = -1, to = -1;
    lista.forEach(function (x, i) { if (x.id === fromId) from = i; if (x.id === toId) to = i; });
    if (from < 0 || to < 0) return;
    var item = lista.splice(from, 1)[0];
    to = lista.findIndex(function (x) { return x.id === toId; });
    lista.splice(antes ? to : to + 1, 0, item);
    lista.forEach(function (x, k) { x.position = k; });
    pintar();
    // Persiste el nuevo orden fila por fila (mismo patrón de guardado de antes).
    (async function () {
      for (var k = 0; k < lista.length; k++) {
        var r = await sb.from(tabla).update({ position: k }).eq('id', lista[k].id);
        if (r.error) { alert('No se pudo guardar el orden: ' + r.error.message); return; }
      }
    })();
  }

  // Conecta una fila como arrastrable: la manija inicia el arrastre y la fila
  // entera es zona de destino, con indicador arriba/abajo según el cursor.
  function arrastrable(fila, grip, item, lista, tabla) {
    grip.draggable = true;
    grip.addEventListener('dragstart', function (e) {
      arrastreId = item.id; arrastreTabla = tabla;
      fila.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      try { e.dataTransfer.setData('text/plain', item.id); } catch (_) {}
      try { e.dataTransfer.setDragImage(fila, 10, 10); } catch (_) {}
    });
    grip.addEventListener('dragend', function () {
      fila.classList.remove('dragging'); limpiarDrop(); arrastreId = null; arrastreTabla = null;
    });
    fila.addEventListener('dragover', function (e) {
      if (arrastreId == null || arrastreTabla !== tabla) return;
      if (item.id === arrastreId || !lista.some(function (x) { return x.id === arrastreId; })) return;
      e.preventDefault(); e.dataTransfer.dropEffect = 'move';
      limpiarDrop();
      var rect = fila.getBoundingClientRect();
      fila.classList.add((e.clientY - rect.top) < rect.height / 2 ? 'drop-antes' : 'drop-despues');
    });
    fila.addEventListener('drop', function (e) {
      if (arrastreId == null || arrastreTabla !== tabla) return;
      if (!lista.some(function (x) { return x.id === arrastreId; })) { limpiarDrop(); return; }
      e.preventDefault();
      var rect = fila.getBoundingClientRect();
      var antes = (e.clientY - rect.top) < rect.height / 2, fromId = arrastreId;
      limpiarDrop(); arrastreId = null; arrastreTabla = null;
      reordenar(lista, fromId, item.id, antes, tabla);
    });
  }

  // recibe uno estable derivado del propio nombre (misma área → mismo color).
  var COLOR_AREA = {
    'trafico': '#b06bff', 'tráfico': '#b06bff', 'trafico pago': '#b06bff', 'tráfico pago': '#b06bff',
    'desarrollo': '#35e5ff', 'dev': '#35e5ff',
    'diseno': '#2ee6a6', 'diseño': '#2ee6a6',
    'copy': '#ff9f43', 'copywriting': '#ff9f43',
    'ventas': '#ff4d6d',
    'automatizaciones': '#f7d154', 'automatizacion': '#f7d154', 'automatización': '#f7d154',
    'crm': '#5b8cff',
    'general': '#948bc4'
  };
  var PALETA_AREA = ['#b06bff', '#35e5ff', '#2ee6a6', '#ff9f43', '#ff4d6d', '#f7d154', '#5b8cff', '#22d3ee', '#a3e635', '#ff2fd0'];
  function colorArea(nombre) {
    var k = (nombre || '').trim().toLowerCase();
    if (COLOR_AREA[k]) return COLOR_AREA[k];
    var s = 0;
    for (var i = 0; i < k.length; i++) s = (s * 31 + k.charCodeAt(i)) >>> 0;
    return PALETA_AREA[k ? s % PALETA_AREA.length : 0];
  }

  // Resumen de una línea (~80–120 caracteres), cortado en un espacio.
  function resumenLog(txt) {
    var s = (txt || '').replace(/\s+/g, ' ').trim();
    if (s.length <= 120) return s;
    var c = s.slice(0, 110), esp = c.lastIndexOf(' ');
    if (esp > 70) c = c.slice(0, esp);
    return c + '…';
  }

  var MESES = ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct', 'Nov', 'Dic'];
  function fechaCorta(iso) {
    var p = String(iso || '').slice(0, 10).split('-');
    if (p.length !== 3) return iso || '';
    var txt = parseInt(p[2], 10) + ' ' + (MESES[parseInt(p[1], 10) - 1] || '');
    if (String(new Date().getFullYear()) !== p[0]) txt += ' ' + p[0];
    return txt;
  }

  function pintarBitacora(z) {
    // --- Formulario en acordeón: oculto hasta pulsar "+ Registrar cambio" ---
    var toggle = el('button', 'pbtn', '+ Registrar cambio');
    var panel = el('div', 'form-log'); panel.style.display = 'none';

    var g = el('div', 'grid');
    var fecha = el('input'); fecha.type = 'date'; fecha.value = hoy();
    var area = el('input'); area.placeholder = 'Área (Tráfico, Diseño, Ventas…)';
    g.appendChild(fecha); g.appendChild(area);
    panel.appendChild(g);

    function ta(ph) { var x = el('textarea'); x.rows = 2; x.placeholder = ph; x.style.marginTop = '9px'; return x; }
    var cambio = ta('Cambio realizado *');
    var motivo = ta('Motivo del cambio');
    var result = ta('Resultado obtenido');
    var notas = ta('Observaciones');
    [cambio, motivo, result, notas].forEach(function (x) { panel.appendChild(x); });

    var bt = el('button', 'pbtn', 'Registrar'); bt.style.marginTop = '11px';
    bt.onclick = async function () {
      if (!area.value.trim() || !cambio.value.trim()) { alert('El área y el cambio son obligatorios.'); return; }
      bt.disabled = true;
      var r = await sb.from('project_log').insert({
        project_id: actual.id, account_id: cuenta, entry_date: fecha.value || hoy(),
        area: area.value.trim(), change_text: cambio.value.trim(),
        reason: motivo.value.trim() || null, result: result.value.trim() || null,
        notes: notas.value.trim() || null, created_by: me.id
      }).select('*').single();
      bt.disabled = false;
      if (r.error) { alert(r.error.message); return; }
      bitacora.unshift(r.data);
      // Al guardar, pintar() vuelve a dibujar la pestaña: formulario cerrado y
      // campos limpios, sin trabajo extra.
      pintar();
    };
    panel.appendChild(bt);

    toggle.onclick = function () {
      var abrir = panel.style.display === 'none';
      panel.style.display = abrir ? 'block' : 'none';
      toggle.textContent = abrir ? 'Cancelar' : '+ Registrar cambio';
      if (abrir) setTimeout(function () { area.focus(); }, 0);
    };

    z.appendChild(toggle);
    z.appendChild(panel);

    // --- Historial como línea de tiempo ---
    if (!bitacora.length) { z.appendChild(el('div', 'empty', 'Todavía no hay cambios registrados.')); return; }
    var tl = el('div', 'timeline');
    bitacora.forEach(function (e2) { tl.appendChild(filaLog(e2)); });
    z.appendChild(tl);
  }

  function filaLog(e2) {
    var color = colorArea(e2.area), expandido = logAbierto === e2.id;
    var item = el('div', 'tl-item');

    var dot = el('span', 'tl-dot'); dot.style.background = color;
    item.appendChild(dot);

    var head = el('div', 'tl-head');
    var a = el('span', 'tl-area', e2.area); a.style.color = color;
    head.appendChild(a);
    head.appendChild(el('span', 'tl-date', fechaCorta(e2.entry_date)));
    var x = el('button', 'x tl-x', '✕'); x.title = 'Eliminar registro';
    x.onclick = async function (ev) {
      ev.stopPropagation();
      if (!confirm('¿Eliminar este registro?')) return;
      await sb.from('project_log').delete().eq('id', e2.id);
      bitacora = bitacora.filter(function (y) { return y.id !== e2.id; }); pintar();
    };
    head.appendChild(x);
    item.appendChild(head);

    // Cerrado: solo el resumen de una línea. Expandido: el detalle completo.
    if (!expandido) {
      item.appendChild(el('div', 'tl-sum', resumenLog(e2.change_text)));
    } else {
      var det = el('div', 'tl-detail');
      det.onclick = function (ev) { ev.stopPropagation(); };
      [['Cambio realizado', e2.change_text], ['Motivo', e2.reason], ['Resultado', e2.result], ['Observaciones', e2.notes]].forEach(function (p) {
        if (!p[1]) return;
        var w = el('div', 'tl-field');
        w.appendChild(el('div', 'lbl', p[0]));
        var v = el('div', 'val'); v.textContent = p[1];
        w.appendChild(v); det.appendChild(w);
      });
      item.appendChild(det);
    }

    item.onclick = function () { logAbierto = expandido ? null : e2.id; pintar(); };
    return item;
  }
})();
</script>
</body>
</html>
